name: בניית EXE ל-Windows

# רץ אוטומטית בכל העלאה ל-main, וגם ניתן להפעיל ידנית מטאב ה-Actions
# (כפתור "Run workflow"). הבנייה מתבצעת על שרת Windows אמיתי של GitHub —
# לא צריך להתקין שום דבר על המחשב האישי.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build installer
        run: |
          cd src-tauri
          cargo tauri build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: bodek-mekorot-setup
          path: src-tauri/target/release/bundle/nsis/*.exe
